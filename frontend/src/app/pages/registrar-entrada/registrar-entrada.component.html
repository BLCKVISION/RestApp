<div class="page">
  <div class="page__header">
    <h1 class="page__title">Registrar Entrada</h1>
    <p class="page__subtitle">Registra la recepción de comidas (donaciones, producción, etc.)</p>
  </div>

  <div class="form-card card animate-fade-in-up">
    <div class="form-card__icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14m-7-7l7 7 7-7"/>
      </svg>
    </div>
    <h2 class="form-card__title">Nueva Entrada de Comida</h2>

    <div class="form-grid">
      <!-- Tipo de Comida -->
      <div class="form-group">
        <label class="form-label">Tipo de Comida *</label>
        <select
          class="form-control form-select"
          [(ngModel)]="form.tipoComidaId"
          id="tipoComidaId"
        >
          <option value="">Seleccionar tipo...</option>
          @for (tipo of tiposComida; track tipo.id) {
            <option [value]="tipo.id">{{ tipo.nombre }} — {{ tipo.descripcion }}</option>
          }
        </select>
      </div>

      <!-- Cantidad -->
      <div class="form-group">
        <label class="form-label">Cantidad *</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="form.cantidad"
          placeholder="Ej: 100"
          min="1"
          id="cantidad"
        />
      </div>

      <!-- Origen -->
      <div class="form-group">
        <label class="form-label">Origen</label>
        <select
          class="form-control form-select"
          [(ngModel)]="form.origen"
          id="origen"
        >
          <option value="">Seleccionar origen...</option>
          @for (o of origenes; track o) {
            <option [value]="o">{{ o }}</option>
          }
        </select>
      </div>

      <!-- Fecha -->
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="form.fecha"
          id="fecha"
        />
      </div>

      <!-- Registrado Por -->
      <div class="form-group form-group--full">
        <label class="form-label">Registrado por *</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="form.registradoPor"
          placeholder="Tu nombre"
          id="registradoPor"
        />
      </div>

      <!-- Nota -->
      <div class="form-group form-group--full">
        <label class="form-label">Nota (opcional)</label>
        <textarea
          class="form-control"
          [(ngModel)]="form.nota"
          placeholder="Detalles adicionales..."
          rows="3"
          id="nota"
        ></textarea>
      </div>
    </div>

    <!-- Submit -->
    <div class="form-actions">
      <button
        class="btn btn--primary btn--lg btn--block"
        [disabled]="!isValid || submitting"
        (click)="submit()"
        id="submitEntrada"
      >
        @if (submitting) {
          <span class="btn-spinner"></span>
          Registrando...
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14m-7-7l7 7 7-7"/>
          </svg>
          Registrar Entrada
        }
      </button>
    </div>
  </div>

  @if (toast) {
    <div class="toast" [class]="'toast--' + toast.type">{{ toast.message }}</div>
  }
</div>
