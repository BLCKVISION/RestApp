<div class="perfil-container animate-fade-in-up">
  <div class="perfil-header">
    <h1 class="perfil-title">Mi Perfil</h1>
    <p class="perfil-subtitle">Administra tu información personal y configuración de la cuenta.</p>
  </div>

  <div class="perfil-grid">
    <!-- Left Column: User Info Card -->
    <div class="perfil-card user-info-card">
      <div class="user-avatar-wrapper">
        <div class="user-avatar">{{ (auth.currentUser()?.nombre || '?').charAt(0).toUpperCase() }}</div>
      </div>
      <h2 class="user-name">{{ auth.currentUser()?.nombre }}</h2>
      <p class="user-role">{{ auth.currentUser()?.role }}</p>

      <div class="user-details">
        <div class="detail-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>&#64;{{ auth.currentUser()?.username }}</span>
        </div>
      </div>
    </div>

    <!-- Right Column: Settings & Password -->
    <div class="perfil-card settings-card">
      <h3 class="card-title">Actualizar Información</h3>

      <form class="settings-form">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" class="form-control" [value]="auth.currentUser()?.nombre" disabled>
          </div>
          <div class="form-group">
            <label>Usuario</label>
            <input type="text" class="form-control" [value]="auth.currentUser()?.username" disabled>
          </div>
        </div>

        <h3 class="card-title mt-4">Cambiar Contraseña</h3>
        <div class="form-group">
          <label>Contraseña Actual</label>
          <input type="password" class="form-control" placeholder="••••••••">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nueva Contraseña</label>
            <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
          </div>
          <div class="form-group">
            <label>Confirmar Nueva Contraseña</label>
            <input type="password" class="form-control" placeholder="Repite la nueva contraseña">
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn--outline" disabled>Cancelar</button>
          <button type="button" class="btn btn--primary" disabled title="Funcionalidad no disponible aún">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
