<div class="login-wrapper">
  <div class="login-card card animate-fade-in-up">
    <div class="login-header">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="var(--primary)"/>
          <path d="M7 12l3 3 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="login-title">AcopioRed</h1>
      <p class="login-subtitle">Inicia sesión en tu cuenta</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      @if (error) {
        <div class="login-error">
          Usuario o contraseña incorrectos.
        </div>
      }

      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input 
          type="text" 
          class="form-control" 
          name="username" 
          [(ngModel)]="username" 
          required 
          placeholder="Ej: admin"
        >
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input 
          type="password" 
          class="form-control" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="••••••••"
        >
      </div>

      <button type="submit" class="btn btn--primary btn--lg btn--block login-btn" [disabled]="!loginForm.valid">
        Entrar al sistema
      </button>
    </form>
  </div>
</div>
