<div class="login-split">
  <!-- Left Side: Floating Image Card -->
  <div class="login-split__left">
    <div class="login-image-card">
      <!-- Logo inside the image -->
      <div class="login-image-card__brand" style="background: transparent;">
        <img src="/img/Logotipo.png" alt="RestApp" style="height: 48px; object-fit: contain;">
      </div>
      <!-- Footer text in the image -->
      <div class="login-image-card__footer">
        Gestiona y optimiza el flujo de alimentos
      </div>
    </div>
  </div>

  <!-- Right Side: Form -->
  <div class="login-split__right">
    <div class="login-form-container animate-fade-in-up">
      
      <div class="login-header">
        <h2 class="login-header__title">Ingresa a tu cuenta para gestionar el centro</h2>
      </div>

      <div class="login-top-bar">
        <span class="top-bar-text">¿Necesitas hacer un pedido público? <a routerLink="/solicitar" class="public-link">Solicitar</a></span>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        @if (error) {
          <div class="login-error">
            Usuario o contraseña incorrectos.
          </div>
        }

        <div class="form-group-float">
          <input 
            type="text" 
            class="form-control-float" 
            name="username" 
            [(ngModel)]="username" 
            required 
            placeholder=" "
            id="usernameInput"
          >
          <label for="usernameInput" class="form-label-float">Usuario</label>
        </div>

        <div class="form-group-float">
          <input 
            type="password" 
            class="form-control-float" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder=" "
            id="passwordInput"
          >
          <label for="passwordInput" class="form-label-float">Contraseña</label>
          <button type="button" class="eye-btn" title="Mostrar contraseña">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button type="submit" class="btn-submit-pill" [disabled]="!loginForm.valid || submitting">
          <span>{{ submitting ? 'Ingresando...' : 'Iniciar Sesión' }}</span>
        </button>
      </form>
      
      <div class="login-footer">
        Al iniciar sesión, aceptas nuestros <a href="#">Términos de Servicio</a>, <br>
        <a href="#">Política de Privacidad</a> y el uso de datos.
      </div>
    </div>
  </div>
</div>
