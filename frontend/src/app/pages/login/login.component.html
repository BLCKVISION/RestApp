<div class="login-split">
  <!-- Left Side: Branding -->
  <div class="login-split__left">
    <div class="login-split__left-content animate-fade-in-up">
      <div class="login-split__logo-box">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="#ff5a36"/>
          <path d="M7 12l3 3 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="login-split__title animate-fade">{{ carouselItems[carouselIndex].title }}</h1>
      <p class="login-split__subtitle animate-fade">
        {{ carouselItems[carouselIndex].description }}
      </p>
      
      <div class="login-split__dots">
        @for (item of carouselItems; track $index) {
          <span 
            class="dot" 
            [class.dot--active]="carouselIndex === $index"
            (click)="setCarouselIndex($index)">
          </span>
        }
      </div>
    </div>
  </div>

  <!-- Right Side: Form -->
  <div class="login-split__right">
    <div class="login-form-container animate-fade-in-up">
      
      <div class="login-header">
        <h2 class="login-header__title">¡Bienvenido de nuevo!</h2>
        <p class="login-header__subtitle">Por favor ingresa tus datos para iniciar sesión</p>
      </div>



      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        @if (error) {
          <div class="login-error">
            Usuario o contraseña incorrectos.
          </div>
        }

        <div class="form-group">
          <label class="form-label">Usuario</label>
          <input 
            type="text" 
            class="form-control" 
            name="username" 
            [(ngModel)]="username" 
            required 
            placeholder="Ej: admin"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input 
            type="password" 
            class="form-control" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder="••••••••"
          >
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--block login-submit-btn" [disabled]="!loginForm.valid">
          Iniciar Sesión
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
      
      <div class="login-footer">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</div>
